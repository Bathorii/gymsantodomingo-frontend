name: Deploy GymSantoDomingo to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build GymSantoDomingo
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_CITY_SLUG: santodomingo
          NEXT_PUBLIC_CITY_NAME: Santo Domingo
          NEXT_PUBLIC_COUNTRY: DO
          NEXT_PUBLIC_LANG: es-DO
          NEXT_PUBLIC_DOMAIN: gymsantodomingo.com
          NEXT_PUBLIC_SITE_NAME: GymSantoDomingo.com
        run: npm run build

      - name: Deploy GymSantoDomingo
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name gymsantodomingo

      - name: IndexNow – Ping Bing
        run: |
          curl -s "https://www.bing.com/indexnow?url=https://gymsantodomingo.com/sitemap.xml&key=1f24f5028307a632cc4e7e4664c73bc6" \
            -o /dev/null -w "IndexNow status: %{http_code}\n"
